[graph]
# Exclude dev-dependencies from license/ban checks.
exclude-dev = true

[advisories]
# Vulnerability scanning is handled by `cargo audit` in CI; cargo-deny
# focuses on licenses, bans, and sources here.
version = 2
ignore = []

[licenses]
version = 2
# Policy: only the licenses this crate itself uses (MIT OR Apache-2.0), plus the
# Apache-2.0 WITH LLVM-exception variant that the Apache-licensed deps offer.
# No proprietary licenses and no copyleft. cargo-deny denies anything not listed
# here, so a dependency carrying any other license fails CI and forces a
# conscious decision rather than silently entering the tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
